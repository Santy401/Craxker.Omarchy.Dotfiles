# Refer to https://wiki.hypr.land/Configuring/Basics/Variables/

# Variables
$activeBorderColor = rgba(33ccffee) rgba(00ff99ee) 45deg
$inactiveBorderColor = rgba(595959aa)

# https://wiki.hypr.land/Configuring/Basics/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 0

    # https://wiki.hypr.land/Configuring/Basics/Variables/#variable-types for info about colors
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Advanced-and-Cool/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#decoration
decoration {
    rounding = 0

    shadow {
        enabled = false
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Basics/Variables/#blur
    blur {
        enabled = false
        size = 2
        passes = 2
        special = true
        brightness = 0.60
        contrast = 0.75
    }
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#group
group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = $activeBorderColor
    col.border_locked_inactive = $inactiveBorderColor

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0

        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)

        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}


# https://wiki.hypr.land/Configuring/Basics/Variables/#animations
animations {
    enabled = yes, please :)

    # Curvas Bezier mejoradas para animaciones más fluidas
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smoothOut, 0.36, 0, 0.13, 1
    bezier = smoothInOut, 0.65, 0, 0.35, 1
    bezier = bounce, 0.71, 1.43, 0.37, 1.05
    bezier = elastic, 0.68, -0.55, 0.27, 1.55
    bezier = winIn, 0.25, 1.35, 0.45, 1
    bezier = winOut, 0.55, 0, 0.75, 0.25

    # Animación global (velocidad base)
    animation = global, 1, 4, smoothOut

    # Bordes de ventanas
    animation = border, 1, 6, smoothOut

    # Ventanas - entrada y salida con efectos modernos
    animation = windows, 1, 4.5, smoothOut, popin 85%
    animation = windowsIn, 1, 5, winIn, popin 80%
    animation = windowsOut, 1, 3.5, winOut, popin 80%

    # Efectos de fade (desvanecimiento)
    animation = fadeIn, 1, 3, smoothOut
    animation = fadeOut, 1, 2, smoothOut
    animation = fade, 1, 3.5, smoothOut

    # Capas (menús, popups, etc)
    animation = layers, 1, 4.5, smoothInOut, popin 70%
    animation = layersIn, 1, 4, smoothInOut, popin 70%
    animation = layersOut, 1, 2.5, smoothOut, popin 70%
    animation = fadeLayersIn, 1, 2.5, smoothOut
    animation = fadeLayersOut, 1, 1.5, smoothOut

    # Workspaces (escritorios) con efecto slide mejorado
    animation = workspaces, 1, 5, smoothOut, slidefade 10%

    # Workspace especial (scratchpad/dropdown)
    animation = specialWorkspace, 1, 4.5, overshot, slidefadevert 15%

    # Efecto de movimiento al minimizar/maximizar
    #animation = move, 1, 5, smoothOut, popin 80%

    # Efecto al cerrar ventanas (zoom out)
    #animation = closeSpecial, 1, 3, smoothOut, popin 70%
}

# See https://wiki.hypr.land/Configuring/Layouts/Dwindle-Layout/ for more
dwindle {
    preserve_split = true
    force_split = 2
}

scrolling {
    column_width = 0.49
}

# See https://wiki.hypr.land/Configuring/Layouts/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering  = true
    disable_scale_notification = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#cursor
cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

# Auto toggle scratchpad on switching workspace from scratchpad
binds {
    hide_special_on_workspace_change = true
}
