# Mouse
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Dividir panes
bind | split-window -h
bind - split-window -v

# Navegar panes con Alt + hjkl
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Recargar config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# SESIONES DE PROYECTO (lanzar con: tmux attach -t simplapp)
new-session -ds simplapp -c ~/github/SimplappV2
new-session -ds opticapp -c ~/github/opticapp.com
new-session -ds dotfiles -c ~/github/Dotfiles
